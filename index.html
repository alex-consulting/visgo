<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>原田式目標管理</title>
<style>
:root{
  --navy:#1a3a6b; --blue:#2563c4; --blue-l:#e8f0fc; --red:#d32f2f; --red-l:#fdecea;
  --bg:#f4f6fa; --card:#ffffff; --line:#d7dee9; --text:#1e2a3a; --sub:#5b6b80;
  --green:#2e7d32; --green-l:#e8f5e9; --amber:#b26a00;
  --radius:12px; --shadow:0 1px 4px rgba(20,40,80,.08);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;
  background:var(--bg);color:var(--text);font-size:15px;line-height:1.55;
  padding-bottom:env(safe-area-inset-bottom)}
header{background:var(--navy);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
header h1{font-size:17px;margin:0;font-weight:700;flex:1;min-width:160px}
.hbtn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);
  border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer}
.hbtn:active{background:rgba(255,255,255,.3)}
#saveState{font-size:12px;opacity:.85}
nav{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:2px solid var(--line);
  display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
nav button{flex:1;min-width:110px;border:none;background:none;padding:13px 8px;font-size:14.5px;
  font-weight:600;color:var(--sub);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
nav button.act{color:var(--blue);border-bottom-color:var(--blue)}
main{max-width:1180px;margin:0 auto;padding:14px}
.tab{display:none}.tab.act{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:14px 16px;margin-bottom:14px}
.card h2{font-size:15px;margin:0 0 10px;color:var(--navy);border-left:4px solid var(--blue);padding-left:8px}
.card h3{font-size:13.5px;margin:12px 0 6px;color:var(--sub)}
.hint{font-size:12px;color:var(--sub);margin:4px 0 8px}
textarea,input[type=text],input[type=date]{width:100%;border:1px solid var(--line);border-radius:8px;
  padding:8px 10px;font:inherit;font-size:14.5px;background:#fcfdff;color:var(--text);resize:none}
textarea:focus,input:focus{outline:2px solid var(--blue);outline-offset:-1px;background:#fff}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row>div{flex:1;min-width:140px}
label.fl{display:block;font-size:12px;font-weight:700;color:var(--sub);margin:8px 0 3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
.quad{border:1px solid var(--line);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.quad .qtitle{width:100%;border:none;background:var(--blue-l);color:var(--navy);font-weight:700;
  font-size:13px;border-radius:0;padding:7px 10px}
.qbody{padding:8px 10px}
.qrow{display:flex;gap:6px;align-items:flex-start;margin-bottom:6px}
.qrow .qnum{flex:0 0 22px;text-align:right;font-weight:700;color:var(--navy);font-size:13px;padding-top:8px}
.qrow textarea{flex:1}
.qbody .add{margin-top:2px;font-size:12.5px;padding:5px 12px}
.zone{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.zone .ztag{flex:0 0 92px;text-align:center;font-size:12px;font-weight:700;border-radius:6px;padding:6px 4px}
.z0 .ztag{background:#fff3e0;color:#e65100}.z1 .ztag{background:#ede7f6;color:#4527a0}
.z2 .ztag{background:var(--green-l);color:var(--green)}.z3 .ztag{background:var(--red-l);color:var(--red)}
.z3 input{border-color:var(--red);border-width:2px;font-weight:700}
.listrow{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.listrow .num{flex:0 0 26px;height:34px;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--sub)}
.listrow input[type=text].small{flex:0 0 110px}
.del{flex:0 0 32px;height:34px;border:none;background:none;color:#c63;font-size:17px;cursor:pointer;border-radius:8px}
.del:hover{background:var(--red-l)}
.add{border:1.5px dashed var(--blue);color:var(--blue);background:none;border-radius:8px;
  padding:7px 14px;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:2px}
.chk{width:22px;height:22px;accent-color:var(--blue);flex:0 0 22px;margin-top:6px;cursor:pointer}
table.an{width:100%;border-collapse:collapse}
table.an th,table.an td{border:1px solid var(--line);padding:6px;font-size:13.5px;vertical-align:top}
table.an th{background:var(--blue-l);color:var(--navy);font-size:12.5px;white-space:nowrap}
table.an td:first-child{background:#f6f8fb;font-weight:700;font-size:12.5px;white-space:nowrap;width:74px}
table.an textarea{border:none;background:transparent;padding:2px;min-height:42px}
/* ---- sheet edit/view bar ---- */
.sheetbar{display:flex;gap:8px;justify-content:flex-end;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.btn-save{border:none;background:var(--blue);color:#fff;border-radius:8px;padding:9px 22px;font-size:14.5px;font-weight:700;cursor:pointer;box-shadow:var(--shadow)}
.btn-save:active{background:#1d50a0}
.btn-edit{border:1.5px solid var(--blue);background:#fff;color:var(--blue);border-radius:8px;padding:9px 24px;font-size:14.5px;font-weight:700;cursor:pointer}
/* ---- read-only view ---- */
.vsheet{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 24px;max-width:920px;margin:0 auto}
@media(max-width:700px){.vsheet{padding:16px 14px}}
.vhead{border-bottom:3px solid var(--navy);padding-bottom:10px;margin-bottom:18px}
.vhead h1{font-size:20px;color:var(--navy);margin:0 0 8px}
.vmeta{display:flex;flex-wrap:wrap;gap:6px 20px;font-size:13.5px}
.vmeta b{color:var(--sub);font-weight:700;margin-right:5px;font-size:12px}
.vsec{margin-bottom:22px}
.vsec h3{font-size:14px;color:#fff;background:var(--navy);display:inline-block;padding:4px 14px;border-radius:6px;margin:0 0 10px}
.vsec p{margin:4px 0;line-height:1.7}
.vsec p b{color:var(--navy)}
.vempty{color:#aab4c2}
.vgoal{border:2px solid var(--red);border-radius:12px;padding:16px 18px;margin-bottom:22px;background:linear-gradient(180deg,#fff,var(--red-l))}
.vgoal-label{display:inline-block;background:var(--red);color:#fff;font-weight:700;font-size:12px;padding:3px 12px;border-radius:5px;margin-bottom:8px}
.vgoal-main{font-size:18px;font-weight:700;color:#b71c1c;line-height:1.6}
.vgoal-note{margin-top:8px;font-size:13.5px;line-height:1.7}
.vgoal .gimgs{margin-top:12px}
.vgoal .gimgs img{height:120px;border-radius:10px;border:1px solid var(--line);cursor:zoom-in}
.vquads{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.vquads{grid-template-columns:1fr}}
.vquad{border:1px solid var(--line);border-radius:10px;overflow:hidden}
.vquad-t{background:var(--blue-l);color:var(--navy);font-weight:700;font-size:13.5px;padding:8px 12px}
.vquad ol{margin:0;padding:10px 12px 10px 30px}
.vquad li{margin-bottom:6px;line-height:1.6}
.vtab{width:100%;border-collapse:collapse;font-size:13.5px}
.vtab th,.vtab td{border:1px solid var(--line);padding:8px 12px;text-align:left;vertical-align:top}
.vtab tr th:first-child{background:#f4f7fb;color:var(--navy);white-space:nowrap;width:1%}
.vtab3 tr:first-child th{background:var(--blue-l);color:var(--navy);text-align:center}
.vms{display:flex;gap:12px;flex-wrap:wrap}
.vmsbox{flex:1;min-width:180px;border:1px solid var(--line);border-radius:8px;padding:10px 12px;line-height:1.6}
.vmsd{font-weight:700;color:var(--navy);border-bottom:1px solid var(--line);padding-bottom:4px;margin-bottom:6px}
.vrt{margin:0;padding-left:24px}
.vrt li{margin-bottom:6px;line-height:1.6}
.vdl{margin-bottom:6px;line-height:1.7}
.vdl b{color:var(--navy);margin:0 4px}
/* ---- OW64 ---- */
.owbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.owbar .seg{display:flex;border:1px solid var(--blue);border-radius:8px;overflow:hidden}
.owbar .seg button{border:none;background:#fff;color:var(--blue);padding:7px 14px;font-size:13.5px;font-weight:600;cursor:pointer}
.owbar .seg button.act{background:var(--blue);color:#fff}
.minimap{display:grid;grid-template-columns:repeat(3,30px);grid-template-rows:repeat(3,30px);gap:3px;margin-left:auto}
.minimap button{border:1px solid var(--line);border-radius:5px;background:#fff;cursor:pointer;font-size:10px;color:var(--sub)}
.minimap button.cur{background:var(--blue);color:#fff;border-color:var(--blue)}
.minimap button.cen{border-color:var(--red)}
.scrollx{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}
.grid9{display:grid;grid-template-columns:repeat(9,minmax(86px,1fr));gap:3px;min-width:820px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.cell{background:#fff;border:1px solid var(--line);border-radius:6px;padding:5px 6px;min-height:62px;
  font-size:11px;line-height:1.4;cursor:pointer;display:flex;align-items:center;justify-content:center;
  text-align:center;word-break:break-word;white-space:pre-wrap}
.grid3 .cell{min-height:88px;font-size:13.5px;padding:8px}
.cell:hover{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-l)}
.cell.ro{cursor:default}
.cell.ro:hover{box-shadow:none}
.cell.theme{background:var(--blue);color:#fff;font-weight:700;border-color:var(--blue)}
.cell.goal{background:var(--red);color:#fff;font-weight:700;border-color:var(--red)}
.cell.empty{color:#b8c2d0;font-style:italic}
.blkhead{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.blkhead .bname{font-weight:700;color:var(--navy);flex:1;text-align:center;font-size:14px}
.blkhead button{border:1px solid var(--line);background:#fff;border-radius:8px;width:38px;height:34px;font-size:15px;cursor:pointer}
/* ---- weekly ---- */
.wknav{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.wknav .wlabel{font-weight:700;color:var(--navy);font-size:15px;min-width:200px;text-align:center}
.wknav button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 13px;font-size:14px;cursor:pointer}
.wknav button.today{color:var(--blue);border-color:var(--blue);font-weight:600}
.progress{height:14px;background:#e3e9f2;border-radius:7px;overflow:hidden;margin:6px 0 2px}
.progress>div{height:100%;background:linear-gradient(90deg,var(--blue),#4caf7d);border-radius:7px;transition:width .3s}
.pct{font-size:13px;font-weight:700;color:var(--navy);text-align:right}
.wtable{width:100%;border-collapse:collapse}
.wtable th,.wtable td{border:1px solid var(--line);padding:4px;text-align:center;font-size:12px}
.wtable th{background:var(--blue-l);color:var(--navy);padding:6px 4px}
.wtable td.rt{text-align:left;font-size:12.5px;padding:6px 8px;min-width:130px}
.wtable td .rsum{color:var(--sub);font-size:11px}
.daybtn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--line);background:#fff;
  cursor:pointer;font-size:13px;color:#b8c2d0;line-height:1}
.daybtn.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:700}
.daybtn.fut{opacity:.45}
td.dsun .daybtn{border-color:#f3c1c1}td.dsat .daybtn{border-color:#bcd2f5}
.ddone{text-decoration:line-through;color:var(--sub)}
/* ---- goal images ---- */
.gimgs{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.gimg{position:relative}
.gimg img{height:96px;border-radius:8px;border:1px solid var(--line);display:block;cursor:zoom-in}
.gimg .gx{position:absolute;top:-8px;right:-8px;width:24px;height:24px;border-radius:50%;
  border:none;background:var(--red);color:#fff;font-size:13px;cursor:pointer;line-height:1;box-shadow:var(--shadow);
  opacity:0;transition:opacity .15s}
.gimg:hover .gx,.gimg:focus-within .gx{opacity:1}
.gadd{height:96px;min-width:96px;border:1.5px dashed var(--blue);color:var(--blue);background:none;
  border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;
  align-items:center;justify-content:center;text-align:center;padding:0 14px;line-height:1.4}
.gadd:hover{background:var(--blue-l)}
#lightbox{position:fixed;inset:0;background:rgba(10,15,25,.88);display:none;
  align-items:center;justify-content:center;z-index:300;cursor:zoom-out}
#lightbox.show{display:flex}
#lightbox img{max-width:94vw;max-height:92vh;border-radius:6px}
/* ---- modal ---- */
#modalBg{position:fixed;inset:0;background:rgba(15,25,45,.45);display:none;z-index:100;
  align-items:flex-end;justify-content:center}
#modalBg.show{display:flex}
@media(min-width:700px){#modalBg{align-items:center}}
#modal{background:#fff;border-radius:14px 14px 0 0;width:100%;max-width:560px;padding:16px;box-shadow:0 -4px 30px rgba(0,0,0,.2)}
@media(min-width:700px){#modal{border-radius:14px}}
#modal h3{margin:0 0 10px;font-size:14px;color:var(--navy)}
#modal textarea{min-height:110px;font-size:16px}
#modal .mbtns{display:flex;gap:10px;margin-top:12px}
#modal .mbtns button{flex:1;padding:11px;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:#fff}
#modal .mbtns .pri{background:var(--blue);color:#fff;border-color:var(--blue)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;
  padding:9px 20px;border-radius:20px;font-size:13.5px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200}
.toast.show{opacity:1}
@media print{nav,header .hbtn,#saveState{display:none}.card{break-inside:avoid}}
</style>
</head>
<body>
<header>
  <h1>原田式目標管理</h1>
  <span id="saveState"></span>
  <button class="hbtn" onclick="exportJSON()">書き出し</button>
  <button class="hbtn" onclick="document.getElementById('impFile').click()">読み込み</button>
  <input type="file" id="impFile" accept=".json" style="display:none" onchange="importJSON(event)">
</header>

<nav>
  <button id="tb-sheet" onclick="showTab('sheet')">📝 長期目標シート</button>
  <button id="tb-ow" onclick="showTab('ow')">🎯 OW64</button>
</nav>

<main>
  <section id="tab-sheet" class="tab"></section>
  <section id="tab-ow" class="tab"></section>
</main>

<div id="modalBg" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <h3 id="modalTitle"></h3>
    <textarea id="modalTa"></textarea>
    <div class="mbtns">
      <button onclick="closeModal()">キャンセル</button>
      <button class="pri" onclick="modalSave()">保存</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div id="lightbox" onclick="this.classList.remove('show')"><img id="lightboxImg" alt=""></div>

<script>
"use strict";
/* ================= デフォルトデータ（PDFより転記） ================= */
const DEFAULT_DATA = {
  meta:{name:"", writeDate:"", targetDate:"", updateDate:""},
  service:{family:"", society:""},
  quad:[
    {title:"社会・他者（有形）", text:""},
    {title:"自分（有形）", text:""},
    {title:"社会・他者（無形）", text:""},
    {title:"自分（無形）", text:""}
  ],
  goal:"",
  goalNote:"",
  zones:["","","",""],
  milestones:[{date:"",text:""}],
  routines:[{id:1,text:""}],
  nextRoutineId:2,
  deadlines:[{id:1,month:"",text:"",done:false}],
  nextDeadlineId:2,
  supports:[{who:"",what:""}],
  analysis:{
    rows:["心・メンタル","技・スキル","体・健康","生活"],
    success:["","","",""],
    failure:["","","",""],
    problem:["","","",""],
    solution:["","","",""]
  },
  ow:{
    goal:"",
    themes:["","","","","","","",""],
    actions:[
      ["","","","","","","",""],["","","","","","","",""],
      ["","","","","","","",""],["","","","","","","",""],
      ["","","","","","","",""],["","","","","","","",""],
      ["","","","","","","",""],["","","","","","","",""]
    ]
  },
  goalImages:[],
  weekly:{}
};

/* ================= 状態管理 ================= */
const LS_KEY="haradaApp_v1";
let D;
try{ D = JSON.parse(localStorage.getItem(LS_KEY)) || structuredClone(DEFAULT_DATA); }
catch(e){ D = structuredClone(DEFAULT_DATA); }
if(!Array.isArray(D.goalImages)) D.goalImages=[]; // 旧データ互換
// 4観点：旧text形式→数字付き箇条書き(items配列)へ移行
(function(){
  function stripNum(s){return s.replace(/^\s*(?:[0-9０-９]+\s*[．.、)）]|[①-⑩]\s*|[一二三四五六七八九十]+\s*[．.、])\s*/,"");}
  (D.quad||[]).forEach(function(q){
    if(!Array.isArray(q.items)){
      q.items=String(q.text||"").split("\n").map(stripNum).filter(function(x){return x.trim()!=="";});
      if(q.items.length===0) q.items=[""];
      delete q.text;
    }
  });
})();
if(!Array.isArray(D.supports)) D.supports=[{who:"",what:""}];

let saveTimer=null;
function save(){
  clearTimeout(saveTimer);
  document.getElementById("saveState").textContent="保存中…";
  saveTimer=setTimeout(()=>{
    try{
      localStorage.setItem(LS_KEY, JSON.stringify(D));
      document.getElementById("saveState").textContent="✓ 保存済み";
    }catch(e){
      document.getElementById("saveState").textContent="⚠ 保存失敗";
    }
  },400);
}
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1800);
}
function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function toDateInput(v){
  if(!v) return "";
  if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
  const m=String(v).match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
  if(!m) return "";
  return `${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`;
}
function fmtDate(v){
  const d=toDateInput(v);
  if(!d) return v||"";
  const [y,mo,da]=d.split("-");
  return `${y}.${+mo}.${+da}`;
}
function fit(t){t.style.height="auto";t.style.height=(t.scrollHeight+2)+"px";}
function fitAll(root){root.querySelectorAll("textarea").forEach(fit);}

/* ================= タブ ================= */
function showTab(name){
  document.querySelectorAll(".tab").forEach(s=>s.classList.remove("act"));
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("act"));
  document.getElementById("tab-"+name).classList.add("act");
  document.getElementById("tb-"+name).classList.add("act");
  if(name==="sheet") renderSheet();
  if(name==="ow") renderOW();
  window.scrollTo(0,0);
}

/* ================= 長期目標シート ================= */
function ta(value,oninput,attrs){
  return `<textarea rows="1" ${attrs||""} data-oi="${oninput}">${esc(value)}</textarea>`;
}
let sheetMode = (D.meta.name||D.goal) ? "view" : "edit";
function renderSheet(){ if(sheetMode==="edit") renderSheetEdit(); else renderSheetView(); }
function setSheetMode(m){ sheetMode=m; renderSheet(); window.scrollTo(0,0); if(m==="view") toast("保存しました"); }
function renderSheetEdit(){
  const root=document.getElementById("tab-sheet");
  const a=D.analysis;
  root.innerHTML=`
  <div class="sheetbar">
    <button class="btn-save" onclick="setSheetMode('view')">✓ 保存して表示</button>
    <button class="add" onclick="printSheet()">🖨 A4印刷 / PDF出力</button>
  </div>
  <div class="card">
    <h2>基本情報</h2>
    <div class="row">
      <div><label class="fl">氏名</label><input type="text" data-oi="meta.name" value="${esc(D.meta.name)}"></div>
      <div><label class="fl">記入日（やると決めた日）</label><input type="date" data-oi="meta.writeDate" value="${esc(toDateInput(D.meta.writeDate))}"></div>
      <div><label class="fl">目標達成日</label><input type="date" data-oi="meta.targetDate" value="${esc(toDateInput(D.meta.targetDate))}"></div>
      <div><label class="fl">更新日</label><input type="date" data-oi="meta.updateDate" value="${esc(toDateInput(D.meta.updateDate))}"></div>
    </div>
  </div>
  <div class="card">
    <h2>奉仕活動</h2>
    <label class="fl">家族</label>${ta(D.service.family,"service.family")}
    <label class="fl">社会</label>${ta(D.service.society,"service.society")}
  </div>
  <div class="card">
    <h2>達成目標</h2>

// 画像をリサイズ・圧縮してdataURL化（保存容量対策）
function compressImage(file){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1000;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){ const r=Math.min(MAX/w,MAX/h); w=Math.round(w*r); h=Math.round(h*r); }
      const cv=document.createElement("canvas");
      cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(img.src);
      resolve(cv.toDataURL("image/jpeg",0.82));
    };
    img.onerror=reject;
    img.src=URL.createObjectURL(file);
  });
}

const BLOCK_NAMES=["左上","上","右上","左","中心","右","左下","下","右下"];
const THEME_OF_BLOCK={0:0,1:1,2:2,3:3,5:4,6:5,7:6,8:7}; // blockIdx -> theme index
// 配色：ブルー（テーマ）＋赤（最終目標）の2色。実践項目は白。
// ブロックの識別は色ではなくブロック間の余白と太枠で行う。
const C_BLUE={s:"#2563c4",l:"#ffffff"};
const THEME_COLORS=[C_BLUE,C_BLUE,C_BLUE,C_BLUE,C_BLUE,C_BLUE,C_BLUE,C_BLUE];
let owMode = window.innerWidth<700 ? "block" : "all";
let owBlock = 4;

function cellInfo(blockIdx,pos){
  // returns {type:'goal'|'theme'|'action', themeIdx, actIdx, text}
  if(blockIdx===4){
    if(pos===4) return {type:"goal",text:D.ow.goal};
    return {type:"theme",themeIdx:THEME_OF_BLOCK[pos],text:D.ow.themes[THEME_OF_BLOCK[pos]]};
  }
  if(pos===4) return {type:"theme",themeIdx:THEME_OF_BLOCK[blockIdx],text:D.ow.themes[THEME_OF_BLOCK[blockIdx]]};
  const ai=pos>4?pos-1:pos;
  return {type:"action",themeIdx:THEME_OF_BLOCK[blockIdx],actIdx:ai,text:D.ow.actions[THEME_OF_BLOCK[blockIdx]][ai]};
}
function cellHTML(blockIdx,pos,extra){
  const c=cellInfo(blockIdx,pos);
  let cls, style="";
  if(c.type==="goal"){ cls="cell goal"; }
  else if(c.type==="theme"){
    const col=THEME_COLORS[c.themeIdx];
    cls="cell theme"+(blockIdx!==4?" ro":"");
    style=`background:${col.s};border-color:${col.s};`;
  }else{
    cls="cell"+(c.text?"":" empty");
  }
  const txt = c.text || (c.type==="action" ? "（タップで入力）" : "");
  return `<div class="${cls}" style="${style}${extra||""}" data-b="${blockIdx}" data-p="${pos}">${esc(txt)}</div>`;
}

        return `<button data-mm="${b}" style="${st}">${b===4?"◎":""}</button>`;}).join("")}
      </div>

  // bind
  root.querySelector("#owAll").onclick=()=>{owMode="all";renderOW();};

    owBlock=(owBlock+(b.dataset.nav==="next"?1:8))%9; renderOW();

  root.querySelectorAll(".cell").forEach(cell=>{

        else toast("テーマは中心ブロックで編集してください");

}

function printDoc(title, bodyHtml, css){
  const f=document.createElement("iframe");
  f.style.cssText="position:fixed;right:0;bottom:0;width:0;height:0;border:0;";
  document.body.appendChild(f);
  const doc=f.contentDocument;
  doc.open();
  doc.write(`<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><title>${esc(title)}</title>
  <style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    color:#1e2a3a;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  ${css}
  </style></head><body>${bodyHtml}</body></html>`);
  doc.close();
  setTimeout(()=>{
    f.contentWindow.focus();
    f.contentWindow.print();
    setTimeout(()=>f.remove(),3000);
  },350);
}

      if(C===8)thick.push("border-right-width:2px");
      if(R%3===0)thick.push("border-top-width:2px");
      if(R===8)thick.push("border-bottom-width:2px");
      if(c.type==="theme") thick.push(`background:${THEME_COLORS[c.themeIdx].s}`,"color:#fff","font-weight:700");
      else if(c.type==="action") thick.push(`background:${THEME_COLORS[c.themeIdx].l}`);
      tds+=`<td class="${cls}" style="${thick.join(";")}">${esc(c.text||"")}</td>`;
    }
    rows+=`<tr>${tds}</tr>`;
  }
  const body=`<div class="head"><h1>原田式OW64</h1>
    <span>${esc(D.meta.name)}　目標達成日：${esc(fmtDate(D.meta.targetDate))}　更新日：${esc(fmtDate(D.meta.updateDate))}</span></div>
  <table>${rows}</table>`;
  const css=`
  @page{size:A4 landscape;margin:8mm}
  .head{display:flex;align-items:baseline;gap:10mm;margin-bottom:2.5mm}
  h1{font-size:13pt}
  .head span{font-size:8.5pt;color:#445}
  table{width:100%;border-collapse:collapse;table-layout:fixed}
  td{border:.5pt solid #5a6b85;font-size:7pt;line-height:1.35;padding:1mm;
    text-align:center;vertical-align:middle;height:19.5mm;word-break:break-word;white-space:pre-wrap}
  td.theme{background:#2563c4;color:#fff;font-weight:700}
  td.goal{background:#d32f2f;color:#fff;font-weight:700;font-size:8pt}`;
  printDoc("原田式OW64", body, css);
}

    <div class="sec"><div class="sttl">ルーティン行動（重要度が高い順）</div>

  </div>
  <table class="meta"><tr><th style="text-align:center">支援者</th><th style="text-align:center;background:#e8f0fc;color:#1a3a6b">支援内容</th></tr>
    ${D.supports.map(s=>`<tr><td style="width:30%;font-weight:700">${esc(s.who)}</td><td>${esc(s.what)}</td></tr>`).join("")}</table>
  <table class="an"><tr><th></th><th>成功・強みの分析</th><th>失敗・弱みの分析</th></tr>
    ${a.rows.map((r,i)=>`<tr><th>${esc(r)}</th><td>${esc(a.success[i])}</td><td>${esc(a.failure[i])}</td></tr>`).join("")}</table>

  .msd{font-weight:700;color:#1a3a6b;border-bottom:.5pt solid #ccd5e2;margin-bottom:.6mm}

/* ================= 入出力 ================= */
function exportJSON(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  const d=new Date();
  a.download=`原田式バックアップ_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast("JSONを書き出しました");
}
function importJSON(ev){
  const f=ev.target.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const obj=JSON.parse(reader.result);
      if(!obj.ow||!obj.routines) throw new Error("形式が違います");
      if(!confirm("現在のデータを読み込んだ内容で上書きします。よろしいですか？")) return;
      D=obj; save();
      showTab("sheet");
      toast("読み込みました");
    }catch(e){ alert("読み込みに失敗しました: "+e.message); }
  };
  reader.readAsText(f);
  ev.target.value="";
}

/* ================= 起動 ================= */
showTab("sheet");
document.getElementById("saveState").textContent = localStorage.getItem(LS_KEY) ? "✓ 保存済み" : "";
