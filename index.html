<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="VISGO">
<title>VISGO</title>
<style>
:root{
  --navy:#1a3a6b; --blue:#2563c4; --blue-l:#e8f0fc; --red:#d32f2f; --red-l:#fdecea;
  --bg:#f4f6fa; --card:#ffffff; --line:#d7dee9; --text:#1e2a3a; --sub:#5b6b80;
  --green:#2e7d32; --green-l:#e8f5e9; --amber:#b26a00;
  --radius:12px; --shadow:0 1px 4px rgba(20,40,80,.08);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;
  background:var(--bg);color:var(--text);font-size:15px;line-height:1.55;
  padding-bottom:env(safe-area-inset-bottom)}
header{background:#fff;color:var(--navy);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:2px solid #dbe4f0}
header h1{font-size:17px;margin:0;font-weight:700;flex:1;min-width:160px}
.hbtn{background:rgba(26,58,107,.07);color:var(--navy);border:1px solid rgba(26,58,107,.22);
  border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer}
.hbtn:active{background:rgba(255,255,255,.3)}
#saveState{font-size:12px;opacity:.85}
nav{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:2px solid var(--line);
  display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
nav button{flex:1;min-width:110px;border:none;background:none;padding:13px 8px;font-size:14.5px;
  font-weight:600;color:var(--sub);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
nav button.act{color:var(--blue);border-bottom-color:var(--blue)}
main{max-width:1180px;margin:0 auto;padding:14px}
.tab{display:none}.tab.act{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:14px 16px;margin-bottom:14px}
.card h2{font-size:15px;margin:0 0 10px;color:var(--navy);border-left:4px solid var(--blue);padding-left:8px}
.card h3{font-size:13.5px;margin:12px 0 6px;color:var(--sub)}
.hint{font-size:12px;color:var(--sub);margin:4px 0 8px}
textarea,input[type=text],input[type=date]{width:100%;border:1px solid var(--line);border-radius:8px;
  padding:8px 10px;font:inherit;font-size:14.5px;background:#fcfdff;color:var(--text);resize:none}
textarea:focus,input:focus{outline:2px solid var(--blue);outline-offset:-1px;background:#fff}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row>div{flex:1;min-width:140px}
label.fl{display:block;font-size:12px;font-weight:700;color:var(--sub);margin:8px 0 3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
.quad{border:1px solid var(--line);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.quad .qtitle{width:100%;border:none;background:var(--blue-l);color:var(--navy);font-weight:700;
  font-size:13px;border-radius:0;padding:7px 10px}
.qbody{padding:8px 10px}
.qrow{display:flex;gap:6px;align-items:flex-start;margin-bottom:6px}
.qrow .qnum{flex:0 0 22px;text-align:right;font-weight:700;color:var(--navy);font-size:13px;padding-top:8px}
.qrow textarea{flex:1}
.qbody .add{margin-top:2px;font-size:12.5px;padding:5px 12px}
.zone{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.zone .ztag{flex:0 0 92px;text-align:center;font-size:12px;font-weight:700;border-radius:6px;padding:6px 4px}
.z0 .ztag{background:#fff3e0;color:#e65100}.z1 .ztag{background:#ede7f6;color:#4527a0}
.z2 .ztag{background:var(--green-l);color:var(--green)}.z3 .ztag{background:var(--red-l);color:var(--red)}
.z3 input{border-color:var(--red);border-width:2px;font-weight:700}
.listrow{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.listrow .num{flex:0 0 26px;height:34px;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--sub)}
.listrow input[type=text].small{flex:0 0 110px}
.listrow input[type=date].small{flex:0 0 150px}
.subtabs{display:flex;gap:6px;margin-bottom:12px}
.subtabs button{border:1px solid var(--line);background:#fff;color:var(--sub);border-radius:8px;padding:6px 16px;font-size:13.5px;font-weight:600;cursor:pointer}
.subtabs button.act{background:var(--blue);color:#fff;border-color:var(--blue)}
.linkbtn{display:inline-block;margin-top:8px;border:none;background:none;color:var(--blue);font-size:13px;font-weight:600;cursor:pointer;text-decoration:underline;padding:4px 0}
.msitem{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.msitem .listrow{margin-bottom:8px}
.msitem.done100{opacity:.55;background:#f1f3f6}
.vmsbox.done100{opacity:.6;background:#f4f6f8}
.msprog{display:flex;align-items:center;gap:8px}
.msprog .msplabel{font-size:12px;font-weight:700;color:var(--sub);flex:0 0 auto}
.msprog .pctin{flex:0 0 70px;text-align:right;padding:6px 8px}
.msprog .pctsign{font-size:13px;color:var(--sub)}
.msprog .progress{flex:1;height:14px;background:#e3e9f2;border-radius:7px;overflow:hidden;margin:0}
.msprog .progress>div{height:100%;background:linear-gradient(90deg,var(--blue),#4caf7d);border-radius:7px;transition:width .25s}
.vprog{display:flex;align-items:center;gap:8px;margin-top:8px}
.vprog .progress{flex:1;height:14px;background:#e3e9f2;border-radius:7px;overflow:hidden;margin:0}
.vprog .progress>div{height:100%;background:linear-gradient(90deg,var(--blue),#4caf7d);border-radius:7px}
.vprog .vpct{font-size:13px;font-weight:700;color:var(--navy);flex:0 0 auto;min-width:38px;text-align:right}
.vdlh{font-weight:700;color:var(--sub);font-size:12px;margin:10px 0 4px}
.del{flex:0 0 32px;height:34px;border:none;background:none;color:#c63;font-size:17px;cursor:pointer;border-radius:8px}
.del:hover{background:var(--red-l)}
.add{border:1.5px dashed var(--blue);color:var(--blue);background:none;border-radius:8px;
  padding:7px 14px;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:2px}
.chk{width:22px;height:22px;accent-color:var(--blue);flex:0 0 22px;margin-top:6px;cursor:pointer}
table.an{width:100%;border-collapse:collapse}
table.an th,table.an td{border:1px solid var(--line);padding:6px;font-size:13.5px;vertical-align:top}
table.an th{background:var(--blue-l);color:var(--navy);font-size:12.5px;white-space:nowrap}
table.an td:first-child{background:#f6f8fb;font-weight:700;font-size:12.5px;white-space:nowrap;width:74px}
table.an textarea{border:none;background:transparent;padding:2px;min-height:42px}
/* ---- sheet edit/view bar ---- */
.sheetbar{display:flex;gap:8px;justify-content:flex-end;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.btn-save{border:none;background:var(--blue);color:#fff;border-radius:8px;padding:9px 22px;font-size:14.5px;font-weight:700;cursor:pointer;box-shadow:var(--shadow)}
.btn-save:active{background:#1d50a0}
.btn-edit{border:1.5px solid var(--blue);background:#fff;color:var(--blue);border-radius:8px;padding:9px 24px;font-size:14.5px;font-weight:700;cursor:pointer}
/* ---- read-only view ---- */
.vsheet{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 24px;max-width:920px;margin:0 auto}
@media(max-width:700px){.vsheet{padding:16px 14px}}
.vhead{border-bottom:3px solid var(--navy);padding-bottom:10px;margin-bottom:18px}
.vhead h1{font-size:20px;color:var(--navy);margin:0 0 8px}
.vmeta{display:flex;flex-wrap:wrap;gap:6px 20px;font-size:13.5px}
.vmeta b{color:var(--sub);font-weight:700;margin-right:5px;font-size:12px}
.vsec{margin-bottom:22px}
.vsec h3{font-size:14px;color:#fff;background:var(--navy);display:inline-block;padding:4px 14px;border-radius:6px;margin:0 0 10px}
.vsec p{margin:4px 0;line-height:1.7}
.vsec p b{color:var(--navy)}
.vempty{color:#aab4c2}
.vgoal{border:2px solid var(--red);border-radius:12px;padding:16px 18px;margin-bottom:22px;background:linear-gradient(180deg,#fff,var(--red-l))}
.vgoal-label{display:inline-block;background:var(--red);color:#fff;font-weight:700;font-size:12px;padding:3px 12px;border-radius:5px;margin-bottom:8px}
.vgoal-main{font-size:18px;font-weight:700;color:#b71c1c;line-height:1.6}
.vgoal-note{margin-top:8px;font-size:13.5px;line-height:1.7}
.vgoal .gimgs{margin-top:12px}
.vgoal .gimgs img{height:120px;border-radius:10px;border:1px solid var(--line);cursor:zoom-in}
.vquads{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.vquads{grid-template-columns:1fr}}
.vquad{border:1px solid var(--line);border-radius:10px;overflow:hidden}
.vquad-t{background:var(--blue-l);color:var(--navy);font-weight:700;font-size:13.5px;padding:8px 12px}
.vquad ol{margin:0;padding:10px 12px 10px 30px}
.vquad li{margin-bottom:6px;line-height:1.6}
.vtab{width:100%;border-collapse:collapse;font-size:13.5px}
.vtab th,.vtab td{border:1px solid var(--line);padding:8px 12px;text-align:left;vertical-align:top}
.vtab tr th:first-child{background:#f4f7fb;color:var(--navy);white-space:nowrap;width:1%}
.vtab3 tr:first-child th{background:var(--blue-l);color:var(--navy);text-align:center}
.vms{display:flex;gap:12px;flex-wrap:wrap}
.vmsbox{flex:1;min-width:180px;border:1px solid var(--line);border-radius:8px;padding:10px 12px;line-height:1.6}
.vmsd{font-weight:700;color:var(--navy);border-bottom:1px solid var(--line);padding-bottom:4px;margin-bottom:6px}
.vrt{margin:0;padding-left:24px}
.vrt li{margin-bottom:6px;line-height:1.6}
.vdl{margin-bottom:6px;line-height:1.7}
.vdl b{color:var(--navy);margin:0 4px}
/* ---- GTD kanban (PC) ---- */
.gtd-intro{font-size:12.5px;color:var(--sub);margin:0 0 10px}
.gtd-cap{display:flex;gap:8px;margin-bottom:14px}
.gtd-cap input{flex:1;font-size:15px;padding:11px 14px}
.gtd-wrap{display:flex;gap:14px;align-items:flex-start}
.gtd-side{flex:0 0 210px;background:#f4f6fa;border:1px solid var(--line);border-radius:10px;padding:10px}
.gtd-main{flex:1;min-width:0}
.gf-h{font-weight:700;font-size:12px;color:var(--navy);margin:12px 0 5px;display:flex;justify-content:space-between;align-items:center}
.gf-h:first-child{margin-top:0}
.gf-toggle{cursor:pointer;user-select:none}
.gf-toggle:hover{color:var(--blue)}
.gf-arrow{font-size:10px;color:var(--sub);margin-right:2px;display:inline-block;transition:transform .2s}
.gf-section.gf-collapsed .gf-arrow{transform:rotate(-90deg)}
.gf-section.gf-collapsed .gf-items{display:none}
.gf-add{border:1px solid var(--blue);color:var(--blue);background:#fff;border-radius:6px;width:22px;height:22px;font-size:13px;cursor:pointer;padding:0;line-height:1}
.gf-item{display:flex;align-items:center;gap:6px;width:100%;text-align:left;padding:6px 8px;border-radius:6px;font-size:13px;color:var(--text);cursor:pointer}
.gf-item:hover{background:#e6ecf5}
.gf-item.act{background:var(--blue);color:#fff;font-weight:600}
.gf-all{font-weight:700;margin-bottom:4px}
.gf-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gf-cnt{margin-left:auto;font-size:11px;opacity:.75;flex:0 0 auto}
.gf-del{opacity:.45;font-size:12px;flex:0 0 auto;padding:0 2px}
.gf-del:hover{opacity:1;color:var(--red)}
.gf-item.act .gf-del{color:#fff;opacity:.85}
.gf-ren{opacity:.45;font-size:12px;flex:0 0 auto;padding:0 2px;cursor:pointer}
.gf-ren:hover{opacity:1;color:var(--blue)}
.gf-item.act .gf-ren{color:#fff;opacity:.85}
.kcat-picker{display:flex;flex-wrap:wrap;gap:4px;flex:1;min-width:0}
.kcat-tag{font-size:11px;padding:2px 8px;border-radius:12px;border:1px solid var(--line);background:#f0f2f6;color:var(--sub);cursor:pointer;user-select:none;transition:background .15s,color .15s}
.kcat-tag:hover{border-color:var(--blue);color:var(--blue)}
.kcat-tag.kcat-on{background:#eff6ff;border-color:#bfdbfe;color:#3b82f6;font-weight:600}
.kcat-none{font-size:11px;color:#bbb;font-style:italic}
.gf-none{font-size:12px;color:#aab4c2;padding:4px 8px}
.kanban{display:block}
.kcol{background:#eef1f6;border:1px solid var(--line);border-radius:10px;display:flex;flex-direction:column;min-height:120px}
.kcol-h{font-weight:700;font-size:12.5px;color:var(--navy);padding:9px 10px;border-bottom:2px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:6px}
.kcount{background:var(--blue);color:#fff;border-radius:10px;font-size:11px;padding:1px 8px;flex:0 0 auto}
.kbody{padding:8px;display:flex;flex-direction:column;gap:8px;min-height:60px;flex:1}
.kbody.kover{background:#dde8fb;outline:2px dashed var(--blue);outline-offset:-4px;border-radius:8px}
.kempty{color:#aab4c2;font-size:11.5px;text-align:center;padding:14px 4px;border:1px dashed var(--line);border-radius:8px}
.kcard{position:relative;background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 30px 8px 8px;box-shadow:var(--shadow);cursor:grab}
.kcard.kdrag{opacity:.5}
.kcard.kdone{opacity:.6;background:#f8f8f8}
.kcard-head{display:flex;align-items:flex-start;gap:6px;cursor:pointer}
.kquad{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;flex:0 0 auto;margin-top:2px}
.kquad-1{background:#f97316;color:#fff}
.kquad-2{background:#14b8a6;color:#fff}
.kquad-3{background:#fb923c;color:#fff}
.kquad-4{background:#94a3b8;color:#fff}
.gm-chk-row{display:flex;gap:20px;margin:4px 0}
.gm-chk-row label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;user-select:none}
.gm-chk-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--blue);cursor:pointer}
#gmQuadLabel{margin-left:auto;font-size:13px;font-weight:700;padding:2px 10px;border-radius:12px}
#gmQuadLabel.q1{background:#fff3e0;color:#f97316}
#gmQuadLabel.q2{background:#e0f7f4;color:#14b8a6}
#gmQuadLabel.q3{background:#fff3e0;color:#fb923c}
#gmQuadLabel.q4{background:#f1f5f9;color:#94a3b8}
.kcard-head:hover .kcard-text{background:#f4f7fb;border-radius:6px}
.kcheck{width:15px;height:15px;cursor:pointer;flex:0 0 auto;margin-top:3px;accent-color:var(--blue)}
.kcard-text{flex:1;font-size:13.5px;padding:2px 4px;line-height:1.5;word-break:break-all;color:var(--text);min-height:22px}
.kcard.kdone .kcard-text{text-decoration:line-through;color:var(--sub)}
.kcard-tags{display:flex;flex-direction:row;align-items:flex-start;gap:6px;margin:6px 0;flex-wrap:wrap}
.ktag{font-size:11.5px;border:1px solid var(--line);border-radius:6px;padding:3px 7px;background:#fafbfd;width:auto;max-width:160px}
.kproj{color:#1565c0}.kctx{color:#7b1fa2}
.kproj-disp{font-size:11px;color:#1565c0;background:#e8f0fe;border:1px solid #c5d8fb;border-radius:6px;padding:2px 7px;white-space:nowrap}
.kmove{border:1px solid var(--line);background:#fff;border-radius:6px;width:24px;height:26px;font-size:11px;cursor:pointer;padding:0}
.kmove:disabled{opacity:.3;cursor:default}
.kstatus{flex:1;font-size:11px;border:1px solid var(--line);border-radius:6px;padding:3px;min-width:0;background:#fff}
.kdel{position:absolute;top:4px;right:4px;border:none;background:none;color:#bbb;font-size:14px;cursor:pointer;border-radius:6px;width:22px;height:22px;padding:0;line-height:1}
.kdel:hover{color:var(--red);background:var(--red-l)}
@media(max-width:1100px){.kanban{}}
/* ---- OW64 ---- */
.owbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.owbar .seg{display:flex;border:1px solid var(--blue);border-radius:8px;overflow:hidden}
.owbar .seg button{border:none;background:#fff;color:var(--blue);padding:7px 14px;font-size:13.5px;font-weight:600;cursor:pointer}
.owbar .seg button.act{background:var(--blue);color:#fff}
.minimap{display:grid;grid-template-columns:repeat(3,30px);grid-template-rows:repeat(3,30px);gap:3px;margin-left:auto}
.minimap button{border:1px solid var(--line);border-radius:5px;background:#fff;cursor:pointer;font-size:10px;color:var(--sub)}
.minimap button.cur{background:var(--blue);color:#fff;border-color:var(--blue)}
.minimap button.cen{border-color:var(--red)}
.scrollx{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}
.grid9{display:grid;grid-template-columns:repeat(9,minmax(86px,1fr));gap:3px;min-width:820px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.cell{background:#fff;border:1px solid var(--line);border-radius:6px;padding:5px 6px;min-height:62px;
  font-size:11px;line-height:1.4;cursor:pointer;display:flex;align-items:center;justify-content:center;
  text-align:center;word-break:break-word;white-space:pre-wrap}
.grid3 .cell{min-height:88px;font-size:13.5px;padding:8px}
.cell:hover{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-l)}
.cell.ro{cursor:default}
.cell.ro:hover{box-shadow:none}
.cell.theme{background:var(--blue);color:#fff;font-weight:700;border-color:var(--blue)}
.cell.goal{background:var(--red);color:#fff;font-weight:700;border-color:var(--red)}
.cell.empty{color:#b8c2d0;font-style:italic}
.blkhead{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.blkhead .bname{font-weight:700;color:var(--navy);flex:1;text-align:center;font-size:14px}
.blkhead button{border:1px solid var(--line);background:#fff;border-radius:8px;width:38px;height:34px;font-size:15px;cursor:pointer}
/* ---- weekly ---- */
.wknav{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.wknav .wlabel{font-weight:700;color:var(--navy);font-size:15px;min-width:200px;text-align:center}
.wknav button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 13px;font-size:14px;cursor:pointer}
.wknav button.today{color:var(--blue);border-color:var(--blue);font-weight:600}
.progress{height:14px;background:#e3e9f2;border-radius:7px;overflow:hidden;margin:6px 0 2px}
.progress>div{height:100%;background:linear-gradient(90deg,var(--blue),#4caf7d);border-radius:7px;transition:width .3s}
.pct{font-size:13px;font-weight:700;color:var(--navy);text-align:right}
.wtable{width:100%;border-collapse:collapse}
.wtable th,.wtable td{border:1px solid var(--line);padding:4px;text-align:center;font-size:12px}
.wtable th{background:var(--blue-l);color:var(--navy);padding:6px 4px}
.wtable td.rt{text-align:left;font-size:12.5px;padding:6px 8px;min-width:130px}
.wtable td .rsum{color:var(--sub);font-size:11px}
.daybtn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--line);background:#fff;
  cursor:pointer;font-size:13px;color:#b8c2d0;line-height:1}
.daybtn.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:700}
.daybtn.fut{opacity:.45}
td.dsun .daybtn{border-color:#f3c1c1}td.dsat .daybtn{border-color:#bcd2f5}
.ddone{text-decoration:line-through;color:var(--sub)}
/* ---- goal images ---- */
.gimgs{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.gimg{position:relative}
.gimg img{height:96px;border-radius:8px;border:1px solid var(--line);display:block;cursor:zoom-in}
.gimg .gx{position:absolute;top:-8px;right:-8px;width:24px;height:24px;border-radius:50%;
  border:none;background:var(--red);color:#fff;font-size:13px;cursor:pointer;line-height:1;box-shadow:var(--shadow);
  opacity:0;transition:opacity .15s}
.gimg:hover .gx,.gimg:focus-within .gx{opacity:1}
.gadd{height:96px;min-width:96px;border:1.5px dashed var(--blue);color:var(--blue);background:none;
  border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;
  align-items:center;justify-content:center;text-align:center;padding:0 14px;line-height:1.4}
.gadd:hover{background:var(--blue-l)}
#lightbox{position:fixed;inset:0;background:rgba(10,15,25,.88);display:none;
  align-items:center;justify-content:center;z-index:300;cursor:zoom-out}
#lightbox.show{display:flex}
#lightbox img{max-width:94vw;max-height:92vh;border-radius:6px}
/* ---- modal ---- */
#modalBg{position:fixed;inset:0;background:rgba(15,25,45,.45);display:none;z-index:100;
  align-items:flex-end;justify-content:center}
#modalBg.show{display:flex}
@media(min-width:700px){#modalBg{align-items:center}}
#modal{background:#fff;border-radius:14px 14px 0 0;width:100%;max-width:560px;padding:16px;box-shadow:0 -4px 30px rgba(0,0,0,.2)}
@media(min-width:700px){#modal{border-radius:14px}}
#modal h3{margin:0 0 10px;font-size:14px;color:var(--navy)}
#modal textarea{min-height:110px;font-size:16px}
#modal .mbtns{display:flex;gap:10px;margin-top:12px}
#modal .mbtns button{flex:1;padding:11px;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:#fff}
#modal .mbtns .pri{background:var(--blue);color:#fff;border-color:var(--blue)}
/* ---- GTD detail modal ---- */
#gtdModalBg{position:fixed;inset:0;background:rgba(15,25,45,.45);display:none;z-index:110;align-items:center;justify-content:center}
#gtdModalBg.show{display:flex}
#gtdModal{background:#fff;border-radius:14px;width:100%;max-width:480px;padding:20px;box-shadow:0 8px 40px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.gm-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.gm-head h3{font-size:15px;color:var(--navy);margin:0}
.gm-close{border:none;background:none;font-size:18px;color:var(--sub);cursor:pointer;padding:0 4px;line-height:1}
.gm-close:hover{color:var(--text)}
.gm-label{font-size:12px;font-weight:700;color:var(--navy);margin:12px 0 5px}
.gm-label:first-of-type{margin-top:0}
#gtdModal textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px;font-size:14px;resize:vertical}
#gmText{min-height:60px}
#gmMemo{min-height:80px}
.gm-row{display:flex;gap:8px}
.gm-row input{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px;font-size:14px}
.gm-dur{display:flex;gap:6px;flex-wrap:wrap}
.gm-dur-btn{border:1px solid var(--line);background:#f4f6fa;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;color:var(--text)}
.gm-dur-btn:hover{border-color:var(--blue);color:var(--blue)}
.gm-dur-btn.act{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
.gm-btns{display:flex;gap:8px;margin-top:16px}
.gm-btns button{flex:1;padding:10px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:#fff}
.gm-btns .gm-save{background:var(--blue);color:#fff;border-color:var(--blue)}
.kmeta-dl,.kmeta-dur{font-size:11px;color:var(--sub);background:#f0f2f6;border-radius:10px;padding:2px 7px;white-space:nowrap}
.kmeta-dl.overdue{background:#fdecea;color:var(--red)}
.kcard{cursor:default}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;
  padding:9px 20px;border-radius:20px;font-size:13.5px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200}
.toast.show{opacity:1}
@media print{nav,header .hbtn,#saveState{display:none}.card{break-inside:avoid}}
</style>
</head>

// 画像はIndexedDB（大容量）に保存し、localStorageには入れない
function idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open("haradaApp",1);
    r.onupgradeneeded=()=>r.result.createObjectStore("kv");
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
function idbSet(k,v){
  return idbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction("kv","readwrite");
    tx.objectStore("kv").put(v,k);
    tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error);
  }));
}
function idbGet(k){
  return idbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction("kv","readonly");
    const rq=tx.objectStore("kv").get(k);
    rq.onsuccess=()=>res(rq.result); rq.onerror=()=>rej(rq.error);
  }));
}

function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
// 保存値（"2025.1.5" 等）を <input type=date> 用の YYYY-MM-DD に変換
function toDateInput(v){
  if(!v) return "";
  if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
  const m=String(v).match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
  if(!m) return "";
  return `${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`;
}
// 表示・印刷用に "2026.11.30" 形式へ
function fmtDate(v){
  const d=toDateInput(v);
  if(!d) return v||"";
  const [y,mo,da]=d.split("-");
  return `${y}.${+mo}.${+da}`;
}
// 週間期日行動の日付（年なし"6/15"等も許容）→ YYYY-MM-DD
function toDateInputMD(v){
  if(!v) return "";
  if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
  const m=String(v).match(/^(\d{1,2})\s*[\/\-月.]\s*(\d{1,2})/);
  if(m){ const y=new Date().getFullYear(); return `${y}-${String(m[1]).padStart(2,"0")}-${String(m[2]).padStart(2,"0")}`; }
  return "";
}
function fmtMD(v){
  const d=toDateInputMD(v); if(!d) return v||"";
  const p=d.split("-"); return `${+p[1]}/${+p[2]}`;
}

function bindSheet(root){

      document.getElementById("lightbox").classList.add("show");
    };
  });
}
// 画像をリサイズ・圧縮してdataURL化（保存容量対策）
function compressImage(file){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1280;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){ const r=Math.min(MAX/w,MAX/h); w=Math.round(w*r); h=Math.round(h*r); }
      const cv=document.createElement("canvas");
      cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(img.src);
      resolve(cv.toDataURL("image/jpeg",0.85));
    };
    img.onerror=reject;
    img.src=URL.createObjectURL(file);
  });
}

/* ================= OW64 ================= */
const BLOCK_NAMES=["左上","上","右上","左","中心","右","左下","下","右下"];
const THEME_OF_BLOCK={0:0,1:1,2:2,3:3,5:4,6:5,7:6,8:7}; // blockIdx -> theme index
// 配色：ブルー（テーマ）＋赤（最終目標）の2色。実践項目は白。
// ブロックの識別は色ではなくブロック間の余白と太枠で行う。
const C_BLUE={s:"#2563c4",l:"#ffffff"};
const THEME_COLORS=[C_BLUE,C_BLUE,C_BLUE,C_BLUE,C_BLUE,C_BLUE,C_BLUE,C_BLUE];
let owMode = window.innerWidth<700 ? "block" : "all";
let owBlock = 4;

function cellInfo(blockIdx,pos){
  // returns {type:'goal'|'theme'|'action', themeIdx, actIdx, text}
  if(blockIdx===4){
    if(pos===4) return {type:"goal",text:D.ow.goal};
    return {type:"theme",themeIdx:THEME_OF_BLOCK[pos],text:D.ow.themes[THEME_OF_BLOCK[pos]]};
  }
  if(pos===4) return {type:"theme",themeIdx:THEME_OF_BLOCK[blockIdx],text:D.ow.themes[THEME_OF_BLOCK[blockIdx]]};
  const ai=pos>4?pos-1:pos;
  return {type:"action",themeIdx:THEME_OF_BLOCK[blockIdx],actIdx:ai,text:D.ow.actions[THEME_OF_BLOCK[blockIdx]][ai]};
}
function cellHTML(blockIdx,pos,extra){
  const c=cellInfo(blockIdx,pos);
  let cls, style="";
  if(c.type==="goal"){ cls="cell goal"; }
  else if(c.type==="theme"){
    const col=THEME_COLORS[c.themeIdx];
    cls="cell theme"+(blockIdx!==4?" ro":"");
    style=`background:${col.s};border-color:${col.s};`;
  }else{
    cls="cell"+(c.text?"":" empty");
  }
  const txt = c.text || (c.type==="action" ? "（タップで入力）" : "");
  return `<div class="${cls}" style="${style}${extra||""}" data-b="${blockIdx}" data-p="${pos}">${esc(txt)}</div>`;
}
function renderOW(){
  const root=document.getElementById("tab-ow");
  let body="";
  if(owMode==="all"){
    let cells="";
    for(let R=0;R<9;R++)for(let C=0;C<9;C++){
      const blockIdx=Math.floor(R/3)*3+Math.floor(C/3);
      const pos=(R%3)*3+(C%3);
      const sep=(C%3===0&&C>0?"margin-left:8px;":"")+(R%3===0&&R>0?"margin-top:8px;":"");
      cells+=cellHTML(blockIdx,pos,sep);
    }
    body=`<div class="scrollx"><div class="grid9">${cells}</div></div>
    <p class="hint">セルをタップして編集。青＝テーマ、赤＝最終目標、白＝実践項目。ブロックは余白で区切っています。</p>`;
  }else{
    let cells="";
    for(let pos=0;pos<9;pos++) cells+=cellHTML(owBlock,pos);
    const bname = owBlock===4 ? "中心ブロック（目標とテーマ）"
      : `${BLOCK_NAMES[owBlock]}：${(D.ow.themes[THEME_OF_BLOCK[owBlock]]||"").replace(/\n/g," ")}`;
    body=`<div class="blkhead">
      <button data-nav="prev" title="前のブロック">◀</button>

    <div class="grid3">${cells}</div>
    <p class="hint">${owBlock===4?"セルをタップして編集。テーマを編集すると各ブロックの中央にも自動反映されます。ブロック移動は◀▶またはミニマップで。":"セルをタップして編集。中央のテーマはここでは編集できません（タップすると中心ブロックへ移動）。"}</p>`;
  }
  root.innerHTML=`<div class="card">
    <div class="owbar">
      <div class="seg">
        <button id="owAll" class="${owMode==="all"?"act":""}">全体表示</button>
        <button id="owBlk" class="${owMode==="block"?"act":""}">ブロック表示</button>
      </div>
      <button class="add" onclick="printOW()" style="margin-top:0">🖨 A4印刷 / PDF</button>
      <div class="minimap">${[0,1,2,3,4,5,6,7,8].map(b=>{
        const cur=owMode==="block"&&owBlock===b;
        let st;
        if(b===4) st=cur?"background:#d32f2f;border-color:#d32f2f;color:#fff":"background:#fff;border-color:#d32f2f;color:#d32f2f";
        else st=cur?"background:#2563c4;border-color:#2563c4;color:#fff":"background:#fff;border-color:#2563c4;color:#2563c4";
        return `<button data-mm="${b}" style="${st}">${b===4?"◎":""}</button>`;}).join("")}
      </div>
    </div>
    ${body}
  </div>`;
  // bind
  root.querySelector("#owAll").onclick=()=>{owMode="all";renderOW();};
  root.querySelector("#owBlk").onclick=()=>{owMode="block";renderOW();};
  root.querySelectorAll("[data-mm]").forEach(b=>b.onclick=()=>{owMode="block";owBlock=+b.dataset.mm;renderOW();});
  root.querySelectorAll("[data-nav]").forEach(b=>b.onclick=()=>{
    owBlock=(owBlock+(b.dataset.nav==="next"?1:8))%9; renderOW();
  });
  root.querySelectorAll(".cell").forEach(cell=>{
    cell.onclick=()=>{
      const b=+cell.dataset.b, p=+cell.dataset.p;
      // 周辺ブロックのテーマセルは編集不可（中心ブロックでのみ編集）
      if(b!==4 && p===4){
        if(owMode==="block"){ owBlock=4; renderOW(); }
        else toast("テーマは中心ブロックで編集してください");
        return;
      }
      openCellEditor(b,p);
    };
  });
}
let modalCtx=null;
function openCellEditor(b,p){
  const c=cellInfo(b,p);
  modalCtx={kind:"ow",b,p,type:c.type,themeIdx:c.themeIdx,actIdx:c.actIdx};
  const title = c.type==="goal" ? "最終目標（中心）"
    : c.type==="theme" ? "テーマ（保存すると周辺ブロックの中央にも自動反映）"
    : "実践項目";
  document.getElementById("modalTitle").textContent=title;
  const taEl=document.getElementById("modalTa");
  taEl.value=c.text||"";
  document.getElementById("modalBg").classList.add("show");
  setTimeout(()=>{taEl.focus();},50);
}
function modalSave(){
  if(!modalCtx) return;
  const v=document.getElementById("modalTa").value.trim();
  if(modalCtx.kind==="ow"){
    if(modalCtx.type==="goal") D.ow.goal=v;
    else if(modalCtx.type==="theme") D.ow.themes[modalCtx.themeIdx]=v;
    else D.ow.actions[modalCtx.themeIdx][modalCtx.actIdx]=v;
    save(); renderOW();
  }
  closeModal();
}
function closeModal(){
  document.getElementById("modalBg").classList.remove("show");

}

  gmProj.innerHTML=`<option value="">（なし）</option>`+D.gtd.projects.map(p=>`<option value="${esc(p)}" ${p===(t.project||"")?'selected':''}>${esc(p)}</option>`).join("");
  document.getElementById("gmDate").value=t.deadline||"";
  document.getElementById("gmTime").value=t.deadlineTime||"";
  document.getElementById("gmMemo").value=t.memo||"";
  document.getElementById("gmUrgent").checked=!!t.urgent;
  document.getElementById("gmImportant").checked=!!t.important;
  updateGmQuadLabel();
  document.getElementById("gmUrgent").onchange=updateGmQuadLabel;
  document.getElementById("gmImportant").onchange=updateGmQuadLabel;
  // カテゴリトグル
  const gmCats=document.getElementById("gmCats");
  const selCats=t.categories||[];
  if(D.gtd.categories.length){
    gmCats.innerHTML=D.gtd.categories.map(c=>
      `<button class="gm-dur-btn${selCats.includes(c)?' act':''}" data-gcat="${esc(c)}">${esc(c)}</button>`
    ).join("");
    gmCats.querySelectorAll("[data-gcat]").forEach(b=>b.onclick=()=>b.classList.toggle("act"));
  } else {
    gmCats.innerHTML=`<span style="font-size:12px;color:#aaa">カテゴリがありません（左サイドバーから追加）</span>`;
  }
  // 所要時間ボタン
  document.querySelectorAll("#gmDurBtns .gm-dur-btn").forEach(b=>{
    b.classList.toggle("act", b.dataset.dur==String(t.duration||""));
    b.onclick=()=>{
      const already=b.classList.contains("act");
      document.querySelectorAll("#gmDurBtns .gm-dur-btn").forEach(x=>x.classList.remove("act"));
      if(!already) b.classList.add("act");
    };
  });
  document.getElementById("gtdModalBg").classList.add("show");
  setTimeout(()=>document.getElementById("gmText").focus(),50);
}
function saveGtdModal(){
  const t=gtdTask(gtdModalId); if(!t) return;
  t.text=document.getElementById("gmText").value.trim();
  t.project=document.getElementById("gmProject").value;
  t.deadline=document.getElementById("gmDate").value;
  t.deadlineTime=document.getElementById("gmTime").value;
  t.memo=document.getElementById("gmMemo").value;
  const actBtn=document.querySelector("#gmDurBtns .gm-dur-btn.act");
  t.duration=actBtn?actBtn.dataset.dur:"";
  t.categories=[...document.querySelectorAll("#gmCats [data-gcat].act")].map(b=>b.dataset.gcat);
  t.urgent=document.getElementById("gmUrgent").checked;
  t.important=document.getElementById("gmImportant").checked;
  save(); renderGTD();
  closeGtdModal();
}
function closeGtdModal(){
  document.getElementById("gtdModalBg").classList.remove("show");
  gtdModalId=null;
}

function printDoc(title, bodyHtml, css){
  const f=document.createElement("iframe");
  f.style.cssText="position:fixed;right:0;bottom:0;width:0;height:0;border:0;";
  document.body.appendChild(f);
  const doc=f.contentDocument;
  doc.open();
  doc.write(`<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><title>${esc(title)}</title>
  <style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    color:#1e2a3a;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  ${css}
  </style></head><body>${bodyHtml}</body></html>`);
  doc.close();
  setTimeout(()=>{
    f.contentWindow.focus();
    f.contentWindow.print();
    setTimeout(()=>f.remove(),3000);
  },350);
}
function printOW(){
  let rows="";
  for(let R=0;R<9;R++){
    let tds="";
    for(let C=0;C<9;C++){
      const blockIdx=Math.floor(R/3)*3+Math.floor(C/3);
      const pos=(R%3)*3+(C%3);
      const c=cellInfo(blockIdx,pos);
      const cls=c.type==="goal"?"goal":c.type==="theme"?"theme":"";
      const thick=[];
      if(C%3===0)thick.push("border-left-width:2px");
      if(C===8)thick.push("border-right-width:2px");
      if(R%3===0)thick.push("border-top-width:2px");
      if(R===8)thick.push("border-bottom-width:2px");
      if(c.type==="theme") thick.push(`background:${THEME_COLORS[c.themeIdx].s}`,"color:#fff","font-weight:700");
      else if(c.type==="action") thick.push(`background:${THEME_COLORS[c.themeIdx].l}`);
      tds+=`<td class="${cls}" style="${thick.join(";")}">${esc(c.text||"")}</td>`;
    }
    rows+=`<tr>${tds}</tr>`;
  }
  const body=`<div class="head"><h1>原田式OW64</h1>
    <span>${esc(D.meta.name)}　目標達成日：${esc(fmtDate(D.meta.targetDate))}　更新日：${esc(fmtDate(D.meta.updateDate))}</span></div>
  <table>${rows}</table>`;

  @page{size:A4 landscape;margin:8mm}
  .head{display:flex;align-items:baseline;gap:10mm;margin-bottom:2.5mm}
  h1{font-size:13pt}
  .head span{font-size:8.5pt;color:#445}
  table{width:100%;border-collapse:collapse;table-layout:fixed}
  td{border:.5pt solid #5a6b85;font-size:7pt;line-height:1.35;padding:1mm;
    text-align:center;vertical-align:middle;height:19.5mm;word-break:break-word;white-space:pre-wrap}
  td.theme{background:#2563c4;color:#fff;font-weight:700}
  td.goal{background:#d32f2f;color:#fff;font-weight:700;font-size:8pt}`;
  printDoc("原田式OW64", body, css);
}

/* ================= GTD タスク（PC版のみ） ================= */
const GTD_COLS=[
  {k:"inbox",  label:"📥 Inbox（受信トレイ）"}
];
let gtdFilter={type:null,value:null}; // {type:'project'|'category', value:'名前'}
let gtdCollapsed={category:false,project:false};
function gtdTask(id){ return D.gtd.tasks.find(t=>String(t.id)===String(id)); }
function gtdListOf(type){ return type==='project'?D.gtd.projects:D.gtd.categories; }
function gtdVisible(){
  return D.gtd.tasks.filter(t=>{
    if(!gtdFilter.type) return true;
    if(gtdFilter.type==='project') return (t.project||"")===gtdFilter.value;
    if(gtdFilter.type==='category') return (t.categories||[]).includes(gtdFilter.value);
    return true;
  });
}
function gtdOpts(list,val){ return list.map(x=>`<option ${x===val?'selected':''}>${esc(x)}</option>`).join(""); }
const GTD_DUR_LABEL={5:"5分",15:"15分",60:"60分",more:"それ以上"};
function gtdQuadrant(t){
  if(t.urgent===undefined&&t.important===undefined) return null;
  const u=!!t.urgent, i=!!t.important;
  if(u&&i) return 1; if(!u&&i) return 2; if(u&&!i) return 3; return 4;
}
function gtdDeadlineStr(t){
  if(!t.deadline) return null;
  const d=new Date(t.deadline+(t.deadlineTime?'T'+t.deadlineTime:''));
  const now=new Date();
  const overdue=d<now&&!t.done;
  const mm=(d.getMonth()+1), dd=d.getDate();
  const time=t.deadlineTime?` ${t.deadlineTime}`:"";
  return {text:`📅 ${mm}/${dd}${time}`, overdue};
}
function gtdCard(t){
  const cats=t.categories||[];
  const catTags=cats.length
    ? cats.map(c=>`<span class="kcat-tag kcat-on">${esc(c)}</span>`).join("")
    : "";
  const dl=gtdDeadlineStr(t);
  const q=gtdQuadrant(t);
  const quadBadge=q?`<span class="kquad kquad-${q}">${q}</span>`:'';
  const textDisp=t.text?esc(t.text):`<span style="color:#bbb">タスク内容を入力...</span>`;
  return `<div class="kcard${t.done?' kdone':''}" draggable="true" data-id="${t.id}">
    <button class="kdel" data-id="${t.id}" title="削除">✕</button>
    <div class="kcard-head" data-open="${t.id}">
      <input type="checkbox" class="kcheck" data-id="${t.id}" ${t.done?'checked':''}>
      <div class="kcard-text">${textDisp}</div>
    </div>
    <div class="kcard-tags">
      ${quadBadge}
      ${dl?`<span class="kmeta-dl${dl.overdue?' overdue':''}">${dl.text}</span>`:''}
      ${t.duration?`<span class="kmeta-dur">⏱ ${GTD_DUR_LABEL[t.duration]||t.duration}</span>`:''}
      ${t.project?`<span class="ktag kproj-disp">📁 ${esc(t.project)}</span>`:''}
      <div class="kcat-picker">${catTags}</div>
    </div>
  </div>`;
}
function gtdFolderItems(type){
  const list=gtdListOf(type);
  if(!list.length) return `<div class="gf-none">（フォルダなし）</div>`;
  return list.map(name=>{
    const cnt=type==='category'
      ? D.gtd.tasks.filter(t=>(t.categories||[]).includes(name)).length
      : D.gtd.tasks.filter(t=>(t.project||"")===name).length;
    const act=(gtdFilter.type===type&&gtdFilter.value===name)?'act':'';
    return `<div class="gf-item ${act}" data-f="${type}" data-v="${esc(name)}">
      <span class="gf-name">${esc(name)}</span><span class="gf-cnt">${cnt}</span>
      <span class="gf-ren" data-renf="${type}" data-v="${esc(name)}" title="名前を変更">✏</span>
      <span class="gf-del" data-delf="${type}" data-v="${esc(name)}" title="フォルダ削除">✕</span></div>`;
  }).join("");
}
function renderGTD(){
  const root=document.getElementById("tab-gtd");
  const vis=gtdVisible();
  root.innerHTML=`
  <div class="gtd-cap">
    <input type="text" id="gtdCapture" placeholder="タスクを追加する">
    <button class="btn-save" onclick="gtdAdd()">追加</button>
  </div>
  <div class="gtd-wrap">
    <aside class="gtd-side">
      <div class="gf-item gf-all ${!gtdFilter.type?'act':''}" data-f="" data-v="">📋 すべて表示</div>
      <div class="gf-section ${gtdCollapsed.category?'gf-collapsed':''}">
        <div class="gf-h gf-toggle" data-toggle="category">
          <span><span class="gf-arrow">▾</span>🏷 カテゴリ</span>
          <button class="gf-add" data-add="category" title="フォルダを追加">＋</button>
        </div>
        <div class="gf-items">${gtdFolderItems('category')}</div>
      </div>
      <div class="gf-section ${gtdCollapsed.project?'gf-collapsed':''}">
        <div class="gf-h gf-toggle" data-toggle="project">
          <span><span class="gf-arrow">▾</span>📁 プロジェクト</span>
          <button class="gf-add" data-add="project" title="フォルダを追加">＋</button>
        </div>
        <div class="gf-items">${gtdFolderItems('project')}</div>
      </div>
    </aside>
    <div class="gtd-main">
      <div class="kanban">
        ${GTD_COLS.map(c=>{
          const items=vis.filter(t=>t.status===c.k);
          return `<div class="kcol">
            <div class="kbody" data-col="${c.k}">
              ${items.map(gtdCard).join("")||`<div class="kempty">ここにドラッグ</div>`}
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>
  </div>`;
  bindGTD(root);
}
function gtdAdd(){
  const cap=document.getElementById("gtdCapture");
  const v=cap.value.trim(); if(!v) return;
  const task={id:D.gtd.nextId++, text:v, status:"inbox", project:"", categories:[], created:Date.now()};
  if(gtdFilter.type==='project') task.project=gtdFilter.value;
  if(gtdFilter.type==='category') task.categories=[gtdFilter.value];
  D.gtd.tasks.unshift(task);
  cap.value=""; save(); renderGTD();
  const c2=document.getElementById("gtdCapture"); if(c2) c2.focus();
}
function bindGTD(root){
  const cap=root.querySelector("#gtdCapture");
  cap.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); gtdAdd(); }});
  root.querySelectorAll("[data-gtd]").forEach(el=>{
    const handler=()=>{
      const dot=el.dataset.gtd.indexOf(".");
      const id=el.dataset.gtd.slice(0,dot), field=el.dataset.gtd.slice(dot+1);
      const t=gtdTask(id); if(t){ t[field]=el.value; }
      save(); renderGTD();
    };
    el.addEventListener("change",handler);
  });
  // 完了チェックボックス
  root.querySelectorAll(".kcheck").forEach(cb=>{
    cb.addEventListener("change",()=>{
      const t=gtdTask(cb.dataset.id); if(!t) return;
      t.done=cb.checked; save(); renderGTD();
    });
  });
  root.querySelectorAll(".kdel").forEach(b=>b.onclick=()=>{
    if(!confirm("このタスクを削除しますか？")) return;
    D.gtd.tasks=D.gtd.tasks.filter(t=>String(t.id)!==String(b.dataset.id)); save(); renderGTD();
  });
  // セクション折りたたみ
  root.querySelectorAll(".gf-toggle").forEach(h=>{
    h.addEventListener("click",e=>{
      if(e.target.closest(".gf-add")) return;
      const type=h.dataset.toggle;
      gtdCollapsed[type]=!gtdCollapsed[type];
      h.closest(".gf-section").classList.toggle("gf-collapsed",gtdCollapsed[type]);
    });
  });
  // フォルダ：選択
  root.querySelectorAll(".gf-item").forEach(it=>{
    it.addEventListener("click",e=>{
      if(e.target.classList.contains("gf-del")||e.target.classList.contains("gf-ren")) return;
      const type=it.dataset.f;
      gtdFilter = type ? {type,value:it.dataset.v} : {type:null,value:null};
      renderGTD();
    });
  });
  // フォルダ：追加
  root.querySelectorAll(".gf-add").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();
    const type=b.dataset.add;
    const name=(prompt(type==='project'?"プロジェクト名を入力":"カテゴリ名を入力")||"").trim();
    if(!name) return;
    const list=gtdListOf(type);
    if(list.indexOf(name)<0) list.push(name);
    save(); renderGTD();
  }));
  // フォルダ：名前変更
  root.querySelectorAll(".gf-ren").forEach(r=>r.addEventListener("click",e=>{
    e.stopPropagation();
    const type=r.dataset.renf, oldName=r.dataset.v;
    const newName=(prompt(`新しい名前を入力（現在：${oldName}）`,oldName)||"").trim();
    if(!newName||newName===oldName) return;
    const list=gtdListOf(type);
    const idx=list.indexOf(oldName); if(idx>=0) list[idx]=newName;
    if(type==='project'){
      D.gtd.tasks.forEach(t=>{ if((t.project||"")===oldName) t.project=newName; });
    } else {
      D.gtd.tasks.forEach(t=>{
        if(!Array.isArray(t.categories)) return;
        const ci=t.categories.indexOf(oldName); if(ci>=0) t.categories[ci]=newName;
      });
    }
    if(gtdFilter.type===type&&gtdFilter.value===oldName) gtdFilter={type,value:newName};
    save(); renderGTD();
  }));
  // フォルダ：削除
  root.querySelectorAll(".gf-del").forEach(d=>d.addEventListener("click",e=>{
    e.stopPropagation();
    const type=d.dataset.delf, name=d.dataset.v;
    if(!confirm(`フォルダ「${name}」を削除しますか？\n（タスクは残り、このフォルダの割り当てが外れます）`)) return;
    const list=gtdListOf(type); const idx=list.indexOf(name); if(idx>=0) list.splice(idx,1);
    if(type==='project'){
      D.gtd.tasks.forEach(t=>{ if((t.project||"")===name) t.project=""; });
    } else {
      D.gtd.tasks.forEach(t=>{ if(Array.isArray(t.categories)) t.categories=t.categories.filter(c=>c!==name); });
    }
    if(gtdFilter.type===type&&gtdFilter.value===name) gtdFilter={type:null,value:null};
    save(); renderGTD();
  }));
  // カード本体クリック → 詳細モーダル
  root.querySelectorAll(".kcard-head").forEach(area=>{
    area.addEventListener("click",e=>{
      if(e.target.closest(".kcheck")) return;
      openGtdModal(area.dataset.open);
    });
  });
  // ドラッグ＆ドロップ
  root.querySelectorAll(".kcard").forEach(card=>{
    card.addEventListener("dragstart",e=>{ e.dataTransfer.setData("text/plain",card.dataset.id); card.classList.add("kdrag"); });
    card.addEventListener("dragend",()=>card.classList.remove("kdrag"));
  });
  root.querySelectorAll(".kbody").forEach(body=>{
    body.addEventListener("dragover",e=>{ e.preventDefault(); body.classList.add("kover"); });
    body.addEventListener("dragleave",()=>body.classList.remove("kover"));
    body.addEventListener("drop",e=>{
      e.preventDefault(); body.classList.remove("kover");
      const t=gtdTask(e.dataTransfer.getData("text/plain"));
      if(t){ t.status=body.dataset.col; save(); renderGTD(); }
    });
  });
}

/* ================= 入出力 ================= */
function exportJSON(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  const d=new Date();
  a.download=`原田式バックアップ_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast("JSONを書き出しました");
}
function importJSON(ev){
  const f=ev.target.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const obj=JSON.parse(reader.result);
      if(!obj.ow||!obj.routines) throw new Error("形式が違います");
      if(!confirm("現在のデータを読み込んだ内容で上書きします。よろしいですか？")) return;
      D=obj; save();
      showTab("sheet");
      toast("読み込みました");
    }catch(e){ alert("読み込みに失敗しました: "+e.message); }
  };
  reader.readAsText(f);
  ev.target.value="";
}

/* ================= 起動 ================= */
showTab("sheet");
document.getElementById("saveState").textContent = localStorage.getItem(LS_KEY) ? "✓ 保存済み" : "";
// 画像をIndexedDBから読み込み（localStorageの容量制限を回避）
(async function(){
  try{
    const imgs=await idbGet("goalImages");
    if(Array.isArray(imgs)&&imgs.length){
      D.goalImages=imgs;
      if(document.getElementById("tab-sheet").classList.contains("act")) renderSheet();
    }else if(D.goalImages&&D.goalImages.length){
      await idbSet("goalImages", D.goalImages); // 旧localStorage画像をIDBへ移行
    }
  }catch(e){}
  try{ const {goalImages, ...rest}=D; localStorage.setItem(LS_KEY, JSON.stringify(rest)); }catch(e){}
})();
</script>
